basePath: /
definitions:
  models.AgentCard:
    properties:
      agent_id:
        type: string
      capabilities:
        items:
          $ref: '#/definitions/models.Capability'
        type: array
      endpoints:
        $ref: '#/definitions/models.Endpoints'
      last_heartbeat:
        type: string
      metadata:
        $ref: '#/definitions/models.CardMeta'
      pricing:
        $ref: '#/definitions/models.Pricing'
      schema_version:
        type: string
      signature:
        type: string
      signed_at:
        type: string
      status:
        description: online, offline, degraded, maintenance
        type: string
      trust:
        $ref: '#/definitions/models.TrustInfo'
      version:
        type: string
    type: object
  models.Capability:
    properties:
      description:
        type: string
      examples:
        items:
          $ref: '#/definitions/models.Example'
        type: array
      input_schema:
        additionalProperties: true
        type: object
      languages:
        description: programming languages supported
        items:
          type: string
        type: array
      latency_p95_ms:
        type: integer
      name:
        type: string
      output_schema:
        additionalProperties: true
        type: object
      protocols:
        description: a2a, mcp, jsonrpc
        items:
          type: string
        type: array
    type: object
  models.CapabilitySummary:
    properties:
      input_types:
        description: e.g., ["text", "code", "image"]
        items:
          type: string
        type: array
      languages:
        description: e.g., ["python", "javascript", "go"]
        items:
          type: string
        type: array
      models:
        description: e.g., ["gpt-4", "claude-3.5-sonnet"]
        items:
          type: string
        type: array
      output_types:
        description: e.g., ["text", "json", "markdown"]
        items:
          type: string
        type: array
      protocols:
        description: e.g., ["a2a", "mcp", "jsonrpc"]
        items:
          type: string
        type: array
      skills:
        description: e.g., ["code-review", "linting", "security-audit"]
        items:
          type: string
        type: array
    type: object
  models.CardMeta:
    properties:
      documentation:
        type: string
      framework:
        type: string
      model:
        type: string
      owner_contact:
        type: string
      source_code:
        type: string
    type: object
  models.DeveloperApprovalRequest:
    properties:
      callback_port:
        description: optional — only used by CLI flow
        type: integer
      metadata:
        additionalProperties:
          type: string
        description: org-specific (email, kyc_id, etc.)
        type: object
      name:
        type: string
      state:
        description: used to encrypt private key
        type: string
    type: object
  models.DeveloperApprovalResponse:
    properties:
      developer_id:
        type: string
      private_key_enc:
        description: AES-GCM encrypted with SHA256(state)
        type: string
      public_key:
        description: ed25519:<base64> — for org-side key custody
        type: string
    type: object
  models.DeveloperProof:
    properties:
      agent_index:
        description: derivation index
        type: integer
      developer_public_key:
        description: ed25519:<base64>
        type: string
      developer_signature:
        description: ed25519:<base64> over (agent_pub || index)
        type: string
    type: object
  models.DeveloperRecord:
    properties:
      dev_handle:
        description: ZNS handle fields (optional — developers can exist without handles)
        type: string
      dev_handle_verified:
        description: true if handle is domain/github verified
        type: boolean
      developer_id:
        description: agdns:dev:<hash>
        type: string
      github:
        description: optional GitHub handle
        type: string
      home_registry:
        description: registry where first registered
        type: string
      name:
        description: human-readable developer name
        type: string
      profile_url:
        description: optional website/profile
        type: string
      public_key:
        description: ed25519:<base64>
        type: string
      registered_at:
        type: string
      schema_version:
        description: schema version
        type: string
      signature:
        description: developer signs the registration
        type: string
      updated_at:
        type: string
      verification_method:
        description: '"dns", "github", or "" (self-claimed)'
        type: string
      verification_proof:
        description: domain name or github username
        type: string
    type: object
  models.DeveloperRegistrationRequest:
    properties:
      github:
        type: string
      handle:
        description: optional ZNS handle, claimed atomically during registration
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      profile_url:
        type: string
      public_key:
        type: string
      signature:
        type: string
    required:
    - name
    - public_key
    - signature
    type: object
  models.DeveloperUpdateRequest:
    properties:
      github:
        type: string
      name:
        type: string
      profile_url:
        type: string
      signature:
        type: string
    required:
    - signature
    type: object
  models.Endpoints:
    properties:
      health:
        type: string
      invoke:
        type: string
      websocket:
        type: string
    type: object
  models.Example:
    properties:
      input:
        type: string
      output:
        type: string
    type: object
  models.HandleClaimRequest:
    properties:
      developer_id:
        type: string
      handle:
        type: string
      public_key:
        type: string
      signature:
        type: string
    required:
    - developer_id
    - handle
    - public_key
    - signature
    type: object
  models.HandleVerifyRequest:
    properties:
      method:
        description: '"dns" or "github"'
        type: string
      proof:
        description: domain name or github username
        type: string
    required:
    - method
    - proof
    type: object
  models.NameBindingRequest:
    properties:
      agent_id:
        type: string
      agent_name:
        type: string
      capability_tags:
        items:
          type: string
        type: array
      developer_handle:
        type: string
      signature:
        type: string
      version:
        type: string
    required:
    - agent_id
    - agent_name
    - developer_handle
    - signature
    type: object
  models.NetworkStats:
    properties:
      estimated_agents:
        type: integer
      estimated_registries:
        type: integer
      gossip_messages_per_hour:
        type: integer
      mesh_connectivity:
        description: 0-1, estimated
        type: number
      searches_per_hour:
        type: integer
    type: object
  models.NetworkStatus:
    properties:
      cached_cards:
        type: integer
      gossip_entries:
        type: integer
      local_agents:
        type: integer
      name:
        type: string
      node_type:
        description: full, light, gateway
        type: string
      peer_count:
        type: integer
      registry_id:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
  models.PeerInfo:
    properties:
      address:
        type: string
      agent_count:
        type: integer
      bloom_filter:
        description: tags/categories bloom filter
        items:
          type: integer
        type: array
      connected_at:
        type: string
      last_seen:
        type: string
      latency_ms:
        description: last measured latency
        type: integer
      name:
        type: string
      public_key:
        type: string
      registry_host:
        description: 'ZNS: the peer''s domain name (e.g., "dns01.zynd.ai")'
        type: string
      registry_id:
        type: string
    type: object
  models.Pricing:
    properties:
      currency:
        type: string
      model:
        description: per-request, subscription, free
        type: string
      payment_methods:
        description: x402, stripe, lightning
        items:
          type: string
        type: array
      rates:
        additionalProperties:
          format: float64
          type: number
        type: object
    type: object
  models.PricingModel:
    properties:
      base_price:
        type: number
      currency:
        description: USD, USDC
        type: string
      details:
        type: string
      type:
        description: free, per-call, subscription, usage-based
        type: string
      unit:
        description: request, token, month
        type: string
    type: object
  models.RegistrationRequest:
    properties:
      agent_name:
        description: ZNS naming fields (optional — requires developer with claimed
          handle)
        type: string
      capability_summary:
        $ref: '#/definitions/models.CapabilitySummary'
      category:
        maxLength: 50
        minLength: 1
        type: string
      developer_id:
        description: Developer identity fields
        type: string
      developer_proof:
        $ref: '#/definitions/models.DeveloperProof'
      entity_url:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      openapi_url:
        type: string
      pricing_model:
        $ref: '#/definitions/models.PricingModel'
      public_key:
        type: string
      service_endpoint:
        type: string
      signature:
        type: string
      summary:
        maxLength: 200
        type: string
      tags:
        items:
          type: string
        maxItems: 20
        type: array
      type:
        description: 'Entity type: "agent" (default) or "service"'
        type: string
      version:
        description: semver, e.g., "2.1.0"
        type: string
    required:
    - category
    - name
    - public_key
    - signature
    - summary
    type: object
  models.RegistryRecord:
    properties:
      agent_id:
        type: string
      agent_index:
        type: integer
      capability_summary:
        $ref: '#/definitions/models.CapabilitySummary'
      category:
        type: string
      codebase_hash:
        description: Codebase integrity
        type: string
      developer_id:
        description: Developer identity fields
        type: string
      developer_proof:
        allOf:
        - $ref: '#/definitions/models.DeveloperProof'
        description: stored as JSONB
      entity_url:
        type: string
      home_registry:
        type: string
      last_heartbeat:
        type: string
      name:
        type: string
      openapi_url:
        type: string
      owner:
        type: string
      pricing_model:
        allOf:
        - $ref: '#/definitions/models.PricingModel'
        description: stored as JSONB
      public_key:
        type: string
      registered_at:
        type: string
      schema_version:
        type: string
      service_endpoint:
        type: string
      signature:
        type: string
      status:
        description: Heartbeat liveness fields (server-managed, excluded from signing)
        type: string
      summary:
        type: string
      tags:
        items:
          type: string
        type: array
      ttl:
        type: integer
      type:
        description: 'Entity type: "agent" (default) or "service"'
        type: string
      updated_at:
        type: string
    type: object
  models.ScoreBreakdown:
    properties:
      availability:
        type: number
      freshness:
        type: number
      semantic_similarity:
        type: number
      text_relevance:
        type: number
      trust_score:
        type: number
    type: object
  models.SearchRequest:
    properties:
      category:
        type: string
      developer_handle:
        description: filter by developer handle
        type: string
      developer_id:
        description: filter by developer
        type: string
      enrich:
        type: boolean
      federated:
        type: boolean
      fqan:
        description: filter by exact FQAN
        type: string
      languages:
        description: e.g., ["python", "javascript"]
        items:
          type: string
        type: array
      max_results:
        type: integer
      min_trust_score:
        type: number
      models:
        description: e.g., ["gpt-4"]
        items:
          type: string
        type: array
      offset:
        type: integer
      protocols:
        description: e.g., ["a2a", "mcp"]
        items:
          type: string
        type: array
      query:
        type: string
      skills:
        description: Capability filters
        items:
          type: string
        type: array
      status:
        description: online, offline, any
        type: string
      tags:
        items:
          type: string
        type: array
      timeout_ms:
        type: integer
      type:
        description: '"agent", "service", or "" (any)'
        type: string
    type: object
  models.SearchResponse:
    properties:
      has_more:
        type: boolean
      offset:
        type: integer
      results:
        items:
          $ref: '#/definitions/models.SearchResult'
        type: array
      search_stats:
        $ref: '#/definitions/models.SearchStats'
      total_found:
        type: integer
    type: object
  models.SearchResult:
    properties:
      agent_id:
        type: string
      capability_summary:
        $ref: '#/definitions/models.CapabilitySummary'
      card:
        allOf:
        - $ref: '#/definitions/models.AgentCard'
        description: included if enrich=true
      category:
        type: string
      developer_handle:
        type: string
      developer_id:
        type: string
      fqan:
        description: ZNS fields (populated when entity has a name binding)
        type: string
      home_registry:
        type: string
      name:
        type: string
      openapi_url:
        type: string
      score:
        type: number
      score_breakdown:
        $ref: '#/definitions/models.ScoreBreakdown'
      service_endpoint:
        type: string
      status:
        type: string
      summary:
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        description: Entity type
        type: string
    type: object
  models.SearchStats:
    properties:
      federated_results:
        type: integer
      gossip_results:
        type: integer
      latency_ms:
        type: integer
      local_results:
        type: integer
      peers_queried:
        type: integer
    type: object
  models.TrustInfo:
    properties:
      avg_rating:
        type: number
      success_rate:
        type: number
      total_invocations:
        type: integer
      uptime_30d:
        type: number
      verifications:
        items:
          $ref: '#/definitions/models.Verification'
        type: array
    type: object
  models.UpdateRequest:
    properties:
      capability_summary:
        $ref: '#/definitions/models.CapabilitySummary'
      category:
        type: string
      codebase_hash:
        type: string
      entity_url:
        type: string
      name:
        type: string
      signature:
        type: string
      summary:
        type: string
      tags:
        items:
          type: string
        type: array
      ttl:
        type: integer
    required:
    - signature
    type: object
  models.Verification:
    properties:
      issued:
        type: string
      issuer:
        type: string
      type:
        type: string
    type: object
  models.ZNSName:
    properties:
      agent_id:
        description: agdns:<hash>
        type: string
      agent_name:
        description: e.g., "doc-translator"
        type: string
      capability_tags:
        description: stored as TEXT[]
        items:
          type: string
        type: array
      current_version:
        type: string
      developer_handle:
        description: e.g., "acme-corp"
        type: string
      developer_id:
        description: agdns:dev:<hash>
        type: string
      fqan:
        description: PRIMARY KEY
        type: string
      registered_at:
        type: string
      registry_host:
        description: e.g., "dns01.zynd.ai"
        type: string
      signature:
        type: string
      updated_at:
        type: string
    type: object
  models.ZNSResolveResponse:
    properties:
      agent_id:
        type: string
      developer_handle:
        type: string
      developer_id:
        type: string
      entity_url:
        type: string
      fqan:
        type: string
      protocols:
        items:
          type: string
        type: array
      public_key:
        type: string
      registry_host:
        type: string
      status:
        type: string
      trust_score:
        type: number
      verification_tier:
        type: string
      version:
        type: string
    type: object
  models.ZNSVersion:
    properties:
      agent_id:
        description: agent_id at this version
        type: string
      build_hash:
        type: string
      fqan:
        type: string
      registered_at:
        type: string
      signature:
        type: string
      version:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Agent DNS
    url: https://github.com/agentdns/agent-dns
  description: Decentralized Agent Registry Network — register, discover, and resolve
    AI entities across a federated mesh.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Agent DNS Registry API
  version: 0.2.0
paths:
  /health:
    get:
      description: Returns OK if the registry node is running.
      produces:
      - application/json
      responses:
        "200":
          description: Health status
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /v1/admin/developers/approve:
    post:
      consumes:
      - application/json
      description: Approve a developer registration in restricted mode. Generates
        a keypair and returns the encrypted private key. Requires Bearer webhook token.
      parameters:
      - description: Bearer <webhook-secret>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Approval request with name and state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.DeveloperApprovalRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Developer approval response with encrypted private key
          schema:
            $ref: '#/definitions/models.DeveloperApprovalResponse'
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Developer already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Approve developer registration
      tags:
      - Admin
  /v1/categories:
    get:
      description: Get all entity categories currently registered in the system.
      produces:
      - application/json
      responses:
        "200":
          description: List of categories
          schema:
            additionalProperties:
              items:
                type: string
              type: array
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List categories
      tags:
      - Search
  /v1/developers:
    post:
      consumes:
      - application/json
      description: Register a new developer identity with name, public_key, and signature.
        Self-registration is disabled in restricted mode.
      parameters:
      - description: Developer registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.DeveloperRegistrationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: developer_id and success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid signature
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Self-registration disabled
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Developer already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new developer
      tags:
      - Developers
  /v1/developers/{developerID}:
    delete:
      description: Deregister a developer identity. Requires Authorization header
        with Bearer ed25519 signature.
      parameters:
      - description: Developer ID
        in: path
        name: developerID
        required: true
        type: string
      - description: Bearer ed25519:<base64sig>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deregistration confirmation
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Ownership verification failed
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Developer not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete developer
      tags:
      - Developers
    get:
      description: Retrieve a developer record by their developer_id. Falls back to
        gossip entries for remote developers.
      parameters:
      - description: Developer ID
        in: path
        name: developerID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Developer record
          schema:
            $ref: '#/definitions/models.DeveloperRecord'
        "404":
          description: Developer not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get developer by ID
      tags:
      - Developers
    put:
      consumes:
      - application/json
      description: Update a developer's profile fields. Requires Authorization header
        with Bearer ed25519 signature.
      parameters:
      - description: Developer ID
        in: path
        name: developerID
        required: true
        type: string
      - description: Bearer ed25519:<base64sig>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.DeveloperUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated developer record
          schema:
            $ref: '#/definitions/models.DeveloperRecord'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Ownership verification failed
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Developer not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update developer profile
      tags:
      - Developers
  /v1/developers/{developerID}/entities:
    get:
      description: 'Retrieve all entities registered by a developer. Alias: GET /v1/developers/{id}/agents.'
      parameters:
      - description: Developer ID
        in: path
        name: developerID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: developer_id, entities, and count
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing developer_id
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List entities by developer
      tags:
      - Developers
  /v1/entities:
    get:
      description: List all registered entities. Filter by type (agent, service) and
        category. Supports pagination.
      parameters:
      - description: 'Filter by type: agent, service (default: all)'
        in: query
        name: type
        type: string
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Max results (default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of entities
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List entities
      tags:
      - Entities
    post:
      consumes:
      - application/json
      description: 'Register an entity. Set type to "service" for services (entity_url
        not required). Alias: POST /v1/agents, POST /v1/services.'
      parameters:
      - description: Entity registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.RegistrationRequest'
      produces:
