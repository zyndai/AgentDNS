[node]
  name = "my-registry"
  type = "full"
  data_dir = "/Users/username/.zynd/data"
  external_ip = "auto"

[mesh]
  listen_port = 4001
  max_peers = 15
  bootstrap_peers = []
  tls_enabled = true

[gossip]
  max_hops = 10
  max_announcements_per_second = 100
  dedup_window_seconds = 300

[registry]
  postgres_url = "postgres://agentdns:agentdns@localhost:5432/agentdns?sslmode=disable"
  max_local_agents = 100000

[search]
  embedding_backend = "onnx"
  embedding_model = "all-MiniLM-L6-v2"
  embedding_dimensions = 384
  embedding_model_dir = "/Users/username/.zynd/models"
  embedding_endpoint = ""
  use_improved_keyword = true
  max_federated_peers = 10
  federated_timeout_ms = 1500
  default_max_results = 20
  [search.ranking]
    method = "weighted"
    text_relevance_weight = 0.3
    semantic_similarity_weight = 0.3
    trust_weight = 0.2
    freshness_weight = 0.1
    availability_weight = 0.1

[cache]
  max_agent_cards = 50000
  agent_card_ttl_seconds = 3600
  max_gossip_entries = 2000000

[redis]
  url = ""
  password = ""
  db = 0
  prefix = "agdns:"

[trust]
  min_display_score = 0.1
  eigentrust_iterations = 5
  attestation_gossip_interval_seconds = 3600

[api]
  listen = "0.0.0.0:8080"
  rate_limit_search = 100
  rate_limit_register = 10000
  cors_origins = ["*"]

[bloom]
  expected_tokens = 500000
  false_positive_rate = 0.01
  update_interval_seconds = 300


[heartbeat]
  enabled = true
  inactive_threshold_seconds = 300
  sweep_interval_seconds = 60
  max_clock_skew_seconds = 60

[onboarding]
  mode = "open/restricted"
  auth_url = "http://localhost:3000/onboard"
  webhook_secret = "whsec_changeme"
