# Agent DNS Registry Node Configuration
# See https://github.com/agentdns/agent-dns for documentation

[node]
name = "my-registry"
type = "full"                           # full | light | gateway
data_dir = "/data"
external_ip = "auto"

[mesh]
listen_port = 4001
max_peers = 15
bootstrap_peers = []

[gossip]
max_hops = 10
max_announcements_per_second = 100
dedup_window_seconds = 300

[registry]
postgres_url = "postgres://agentdns:agentdns@localhost:5432/agentdns?sslmode=disable"
max_local_agents = 100000

[search]
# Embedding backend: "hash" (fast, no ML), "onnx" (local ML model), "http" (external API)
embedding_backend = "hash"
# Model name (for ONNX): "all-MiniLM-L6-v2" (fast), "bge-small-en-v1.5" (balanced), "e5-small-v2" (quality)
embedding_model = "all-MiniLM-L6-v2"
embedding_dimensions = 384
# Model directory (auto-download if not present)
embedding_model_dir = "~/.agentdns/models"
# HTTP endpoint (for "http" backend, e.g., Ollama, OpenAI)
embedding_endpoint = ""
# Use improved BM25 with field boosting, stemming, and synonyms
use_improved_keyword = true
max_federated_peers = 10
federated_timeout_ms = 1500
default_max_results = 20

[search.ranking]
text_relevance_weight = 0.30
semantic_similarity_weight = 0.30
trust_weight = 0.20
freshness_weight = 0.10
availability_weight = 0.10

[cache]
max_agent_cards = 50000
agent_card_ttl_seconds = 3600
max_gossip_entries = 2000000

# Redis cache layer (optional)
# Leave url empty to disable Redis and use in-process caches only.
# Redis is used for: Agent Card cache, search result cache,
# bloom filters, rate limiting, peer heartbeat state.
[redis]
url = ""                                # e.g. "redis://localhost:6379/0"
password = ""
db = 0
prefix = "agdns:"

[trust]
min_display_score = 0.1
eigentrust_iterations = 5
attestation_gossip_interval_seconds = 3600

[api]
listen = "0.0.0.0:8080"
rate_limit_search = 100
rate_limit_register = 10
cors_origins = ["*"]

[bloom]
expected_tokens = 500000
false_positive_rate = 0.01
update_interval_seconds = 300

[heartbeat]
enabled = true
inactive_threshold_seconds = 300
sweep_interval_seconds = 60
max_clock_skew_seconds = 60
