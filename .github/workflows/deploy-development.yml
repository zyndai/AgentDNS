name: Development Deploy AgentDNS (Sequential)

on:
  push:
    branches:
      - development

jobs:
  deploy-server-1:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_1 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "==> Setting Go path..."
            export PATH=$PATH:/usr/local/go/bin

            echo "==> Navigating to project..."
            cd /home/azureuser/AgentDNS

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building binary..."
            go mod download
            go build -o agentdns ./cmd/agentdns

            echo "==> Restarting service via systemd..."
            sudo systemctl restart agentdns

            echo "==> Waiting for service..."
            sleep 3

            echo "==> Health check..."
            curl -f http://localhost:8080/health || exit 1

            echo "✅ Server 1 deployed successfully"


  deploy-server-2:
    runs-on: ubuntu-latest
    needs: deploy-server-1   # ensures sequential deploy

    steps:
      - name: Deploy to Server 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_2 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "==> Setting Go path..."
            export PATH=$PATH:/usr/local/go/bin

            echo "==> Navigating to project..."
            cd /home/azureuser/AgentDNS

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building binary..."
            go mod download
            go build -o agentdns ./cmd/agentdns

            echo "==> Restarting service via systemd..."
            sudo systemctl restart agentdns

            echo "==> Waiting for service..."
            sleep 3

            echo "==> Health check..."
            curl -f http://localhost:8080/health || exit 1

            echo "✅ Server 2 deployed successfully"