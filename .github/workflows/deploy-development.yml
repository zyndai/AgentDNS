name: Development Deploy AgentDNS (Sequential)

on:
  push:
    branches:
      - development

jobs:
  deploy-server-1:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_1 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "==> Setting Go path..."
            export PATH=$PATH:/usr/local/go/bin

            echo "==> Navigating to project..."
            cd /home/azureuser/AgentDNS

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building binary..."
            go mod download
            go build -o agentdns ./cmd/agentdns

            echo "==> Restarting service via systemd..."
            sudo systemctl restart agentdns

            echo "==> Waiting for service to become healthy..."
            for i in {1..10}; do
              if curl -fsS http://localhost:8080/health > /dev/null; then
                echo "✅ Service is up (attempt $i)"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "❌ Service failed to start after 10 attempts (~20s)"
                echo "==> Last 50 lines of journalctl for agentdns:"
                sudo journalctl -u agentdns -n 50 --no-pager || true
                exit 1
              fi
              echo "Attempt $i — retrying in 2s..."
              sleep 2
            done

            echo "✅ Server 1 deployed successfully"


  deploy-server-2:
    runs-on: ubuntu-latest
    needs: deploy-server-1   # ensures sequential deploy

    steps:
      - name: Deploy to Server 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_2 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "==> Setting Go path..."
            export PATH=$PATH:/usr/local/go/bin

            echo "==> Navigating to project..."
            cd /home/azureuser/AgentDNS

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building binary..."
            go mod download
            go build -o agentdns ./cmd/agentdns

            echo "==> Restarting service via systemd..."
            sudo systemctl restart agentdns

            echo "==> Waiting for service to become healthy..."
            for i in {1..10}; do
              if curl -fsS http://localhost:8080/health > /dev/null; then
                echo "✅ Service is up (attempt $i)"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "❌ Service failed to start after 10 attempts (~20s)"
                echo "==> Last 50 lines of journalctl for agentdns:"
                sudo journalctl -u agentdns -n 50 --no-pager || true
                exit 1
              fi
              echo "Attempt $i — retrying in 2s..."
              sleep 2
            done

            echo "✅ Server 2 deployed successfully"