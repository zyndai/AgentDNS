name: Deploy AgentDNS (Sequential)

on:
  push:
    branches:
      - main

jobs:
  deploy-server-1:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_1 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /home/azureuser/AgentDNS

            echo "==> [Server 1] Pulling latest code..."
            git pull origin main

            echo "==> [Server 1] Building..."
            go mod download
            go build -v -o agentdns ./cmd/agentdns

            echo "==> [Server 1] Restarting..."
            pkill -f agentdns || true
            nohup ./agentdns > agentdns.log 2>&1 &

  deploy-server-2:
    runs-on: ubuntu-latest
    needs: deploy-server-1   # 👈 THIS makes it sequential

    steps:
      - name: Deploy to Server 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_2 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /home/azureuser/AgentDNS

            echo "==> [Server 2] Pulling latest code..."
            git pull origin main

            echo "==> [Server 2] Building..."
            go mod download
            go build -v -o agentdns ./cmd/agentdns

            echo "==> [Server 2] Restarting..."
            pkill -f agentdns || true
            nohup ./agentdns > agentdns.log 2>&1 & 