name: Deploy AgentDNS (Sequential)

on:
  push:
    branches:
      - main

jobs:
  deploy-server-1:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_1 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # Ensure Go is available
            export PATH=$PATH:/usr/local/go/bin

            cd /home/azureuser/AgentDNS

            echo "==> [Server 1] Pulling latest code..."
            git pull origin main

            echo "==> [Server 1] Building..."
            go mod download
            go build -v -o agentdns ./cmd/agentdns

            echo "==> [Server 1] Restarting..."

            # Kill old process safely (detached so CI doesn't fail)
            (setsid pkill -f agentdns >/dev/null 2>&1 &) || true
            sleep 1

            # Start new process (no sudo!)
            nohup ./agentdns > agentdns.log 2>&1 < /dev/null &

  deploy-server-2:
    runs-on: ubuntu-latest
    needs: deploy-server-1   # ensures sequential deploy

    steps:
      - name: Deploy to Server 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_2 }}
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # Ensure Go is available
            export PATH=$PATH:/usr/local/go/bin

            cd /home/azureuser/AgentDNS

            echo "==> [Server 2] Pulling latest code..."
            git pull origin main

            echo "==> [Server 2] Building..."
            go mod download
            go build -v -o agentdns ./cmd/agentdns

            echo "==> [Server 2] Restarting..."

            # Kill old process safely
            (setsid pkill -f agentdns >/dev/null 2>&1 &) || true
            sleep 1

            # Start new process
            nohup ./agentdns > agentdns.log 2>&1 < /dev/null &