version: "3.8"

# Agent DNS multi-node local testbed
# Spins up 3 registry nodes + PostgreSQL + Redis for development and testing

services:
  # PostgreSQL for durable storage (registry records, gossip, attestations)
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentdns
      POSTGRES_PASSWORD: agentdns
      POSTGRES_DB: agentdns
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentdns"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis for Agent Card caching, rate limiting, bloom filters
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Registry Node A (primary seed node)
  registry-a:
    build: .
    ports:
      - "8080:8080"
      - "4001:4001"
    volumes:
      - registry-a-data:/data
      - ./config/node-a.toml:/config/config.toml:ro
    environment:
      - AGENTDNS_NODE_NAME=registry-a
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Registry Node B (peers with A)
  registry-b:
    build: .
    ports:
      - "8081:8080"
      - "4002:4001"
    volumes:
      - registry-b-data:/data
      - ./config/node-b.toml:/config/config.toml:ro
    environment:
      - AGENTDNS_NODE_NAME=registry-b
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry-a:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Registry Node C (peers with A and B)
  registry-c:
    build: .
    ports:
      - "8082:8080"
      - "4003:4001"
    volumes:
      - registry-c-data:/data
      - ./config/node-c.toml:/config/config.toml:ro
    environment:
      - AGENTDNS_NODE_NAME=registry-c
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry-a:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  registry-a-data:
  registry-b-data:
  registry-c-data:
